<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型训练 - 拉曼光谱边缘客户端</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .training-page { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .training-section { background: #1a1a2e; border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .training-section h3 { color: #fff; margin-bottom: 15px; }
        .dataset-selector label, .model-selector label { display: block; color: #aaa; margin: 10px 0; cursor: pointer; }
        .dataset-selector input[type="radio"], .model-selector input[type="radio"] { margin-right: 10px; }
        .progress-container { background: #2a2a3e; border-radius: 4px; height: 30px; overflow: hidden; margin: 15px 0; }
        .progress-fill { background: linear-gradient(90deg, #00d9ff, #00ff88); height: 100%; transition: width 0.3s; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }
        .progress-info { display: flex; justify-content: space-between; color: #aaa; font-size: 14px; }
        .chart-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        #loss-chart, #accuracy-chart { height: 300px; background: #0a0a1a; border-radius: 8px; padding: 10px; }
        .training-controls { display: flex; gap: 10px; margin: 20px 0; }
        .training-logs { background: #0a0a1a; border-radius: 8px; padding: 15px; max-height: 300px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 12px; }
        .log-entry { margin: 5px 0; padding: 5px; border-left: 3px solid #00d9ff; background: #1a1a2e; }
        .log-entry.success { border-left-color: #00ff88; }
        .log-entry.error { border-left-color: #ff4444; }
        .log-entry.warning { border-left-color: #ffaa00; }
    </style>
</head>
<body>
    <header class="header">
        <h1>🎓 模型训练</h1>
    </header>

    <nav class="main-nav">
        <a href="../index.html" class="nav-link">🏠 首页</a>
        <a href="training.html" class="nav-link active">🎓 模型训练</a>
        <a href="comparison.html" class="nav-link">📊 模型对比</a>
        <a href="features.html" class="nav-link">🔬 特征可视化</a>
    </nav>

    <main class="training-page">
        <section class="training-section">
            <h3>1. 选择数据集</h3>
            <div class="dataset-selector">
                <label>
                    <input type="radio" name="dataset" value="rruff" checked>
                    📊 RRUFF 矿物光谱（10000+ 样本）- 用于 Transformer 预训练
                </label>
                <label>
                    <input type="radio" name="dataset" value="custom">
                    📁 自定义数据集 - 上传自己的光谱数据
                </label>
                <label>
                    <input type="radio" name="dataset" value="demo">
                    🧪 演示数据（合成） - 快速测试
                </label>
            </div>
        </section>

        <section class="training-section">
            <h3>2. 选择模型</h3>
            <div class="model-selector">
                <label>
                    <input type="radio" name="model" value="random_forest" checked>
                    🌲 随机森林 - CPU 训练，约 5 分钟，预期准确率 85%
                </label>
                <label>
                    <input type="radio" name="model" value="transformer">
                    🦾 Transformer (ViT-Tiny) - 需要 GPU，约 2 小时，预期准确率 92%
                </label>
            </div>
        </section>

        <section class="training-section">
            <h3>3. 训练配置</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label style="color:#aaa;">训练轮数 (Epochs):</label>
                    <input type="number" id="epochs" value="50" min="10" max="200" style="width:100%;background:#2a2a3e;color:#fff;border:1px solid #444;padding:8px;border-radius:4px;">
                </div>
                <div>
                    <label style="color:#aaa;">批次大小 (Batch Size):</label>
                    <input type="number" id="batch-size" value="32" min="8" max="256" style="width:100%;background:#2a2a3e;color:#fff;border:1px solid #444;padding:8px;border-radius:4px;">
                </div>
                <div>
                    <label style="color:#aaa;">学习率 (Learning Rate):</label>
                    <input type="text" id="learning-rate" value="0.001" style="width:100%;background:#2a2a3e;color:#fff;border:1px solid #444;padding:8px;border-radius:4px;">
                </div>
                <div>
                    <label style="color:#aaa;">验证集比例:</label>
                    <input type="text" id="val-ratio" value="20%" style="width:100%;background:#2a2a3e;color:#fff;border:1px solid #444;padding:8px;border-radius:4px;">
                </div>
            </div>
        </section>

        <section class="training-section">
            <h3>4. 训练进度</h3>
            <div class="progress-container">
                <div class="progress-fill" id="training-progress" style="width: 0%;">0%</div>
            </div>
            <div class="progress-info">
                <span id="epoch-info">Epoch: 0/50</span>
                <span id="accuracy-info">准确率：--%</span>
                <span id="time-info">剩余时间：--</span>
            </div>

            <div class="chart-container">
                <div id="loss-chart"></div>
                <div id="accuracy-chart"></div>
            </div>
        </section>

        <section class="training-controls">
            <button class="btn btn-primary" id="btn-start-training">▶️ 开始训练</button>
            <button class="btn btn-warning" id="btn-pause-training" disabled>⏸️ 暂停</button>
            <button class="btn btn-danger" id="btn-stop-training" disabled>⏹️ 停止</button>
        </section>

        <section class="training-section">
            <h3>训练日志</h3>
            <div class="training-logs" id="training-log">
                <div class="log-entry">等待开始训练...</div>
            </div>
        </section>
    </main>

    <script src="../echarts.min.js"></script>
    <script type="module" src="../js/training.js"></script>
</body>
</html>
