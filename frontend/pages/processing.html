<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>谱图预处理 - 拉曼光谱边缘客户端</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .processing-container { padding: 20px; }
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn-tool {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            background: #333;
            color: #aaa;
            transition: all 0.2s;
        }
        .btn-tool:hover {
            background: #444;
            color: #fff;
        }
        .btn-tool.active {
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            color: #000;
        }
        .btn-apply {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #000;
        }
        .btn-reset {
            background: linear-gradient(135deg, #ffaa00 0%, #cc8800 100%);
            color: #000;
        }
        .charts-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-panel {
            flex: 1;
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #333;
        }
        .chart-panel h3 {
            color: #00d9ff;
            margin: 0 0 10px 0;
            font-size: 1em;
        }
        .params-panel {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #333;
        }
        .param-group {
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        .param-group label {
            display: block;
            color: #aaa;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        .param-group input[type="range"],
        .param-group select,
        .param-group input[type="number"] {
            width: 100%;
            background: #1a1a2e;
            color: #eee;
            border: 1px solid #333;
            padding: 8px;
            border-radius: 4px;
        }
        .history-panel {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            max-height: 100px;
            overflow-y: auto;
        }
        .history-item {
            font-size: 0.85em;
            color: #888;
            padding: 4px 0;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 谱图预处理</h1>
        <button onclick="window.close()" style="background:transparent;border:none;color:#fff;font-size:24px;cursor:pointer;">×</button>
    </div>

    <div class="processing-container">
        <!-- 工具栏 -->
        <div class="toolbar">
            <button class="btn-tool active" data-tool="smooth">平滑</button>
            <button class="btn-tool" data-tool="baseline">基线校正</button>
            <button class="btn-tool" data-tool="normalize">归一化</button>
            <button class="btn-tool" data-tool="derivative">求导</button>
            <button class="btn-tool" data-tool="snv">SNV</button>
            <button class="btn-tool btn-reset" id="btn-reset">重置</button>
            <button class="btn-tool btn-apply" id="btn-apply">应用</button>
            <button class="btn-tool" id="btn-export">导出</button>
        </div>

        <!-- 图表行 -->
        <div class="charts-row">
            <div class="chart-panel">
                <h3>原始光谱</h3>
                <div id="original-chart" style="width: 100%; height: 300px;"></div>
            </div>
            <div class="chart-panel">
                <h3>处理后光谱</h3>
                <div id="processed-chart" style="width: 100%; height: 300px;"></div>
            </div>
        </div>

        <!-- 参数面板 -->
        <div class="params-panel">
            <h3 style="color: #00d9ff; margin: 0 0 15px 0;">参数设置</h3>
            
            <div id="smooth-params" class="param-section">
                <div class="param-group">
                    <label>平滑方法</label>
                    <select id="smooth-method">
                        <option value="savitzky_golay">Savitzky-Golay</option>
                        <option value="gaussian">高斯平滑</option>
                    </select>
                </div>
                <div class="param-group">
                    <label>窗口大小：<span id="window-value">5</span></label>
                    <input type="range" id="window-slider" min="3" max="21" step="2" value="5">
                </div>
                <div class="param-group" id="poly-order-group">
                    <label>多项式阶数：<span id="poly-value">2</span></label>
                    <input type="range" id="poly-slider" min="1" max="5" step="1" value="2">
                </div>
            </div>

            <div id="baseline-params" class="param-section" style="display: none;">
                <div class="param-group">
                    <label>基线方法</label>
                    <select id="baseline-method">
                        <option value="iterative_poly">迭代多项式</option>
                        <option value="airpls">AIRPLS</option>
                    </select>
                </div>
                <div class="param-group">
                    <label>多项式阶数：<span id="baseline-order-value">5</span></label>
                    <input type="range" id="baseline-order-slider" min="2" max="10" step="1" value="5">
                </div>
                <div class="param-group">
                    <label>迭代次数：<span id="iter-value">10</span></label>
                    <input type="range" id="iter-slider" min="5" max="50" step="5" value="10">
                </div>
            </div>

            <div id="normalize-params" class="param-section" style="display: none;">
                <div class="param-group">
                    <label>归一化方法</label>
                    <select id="normalize-method">
                        <option value="minmax">Min-Max</option>
                        <option value="area">面积归一化</option>
                        <option value="vector">矢量归一化</option>
                    </select>
                </div>
            </div>

            <div id="derivative-params" class="param-section" style="display: none;">
                <div class="param-group">
                    <label>导数阶数</label>
                    <select id="derivative-order">
                        <option value="1">一阶导数</option>
                        <option value="2">二阶导数</option>
                    </select>
                </div>
                <div class="param-group">
                    <label>平滑窗口：<span id="deriv-window-value">5</span></label>
                    <input type="range" id="deriv-window-slider" min="3" max="21" step="2" value="5">
                </div>
            </div>

            <div id="snv-params" class="param-section" style="display: none;">
                <p style="color: #888; font-size: 0.9em;">SNV (标准正态变量变换) 无需参数设置</p>
            </div>

            <!-- 处理历史 -->
            <div class="history-panel">
                <h4 style="color: #aaa; margin: 0 0 10px 0;">处理历史</h4>
                <div id="history-list"></div>
            </div>
        </div>
    </div>

    <script src="../echarts.min.js"></script>
    <script src="../qwebchannel.js"></script>
    <script type="module" src="../js/processing.js"></script>
</body>
</html>
