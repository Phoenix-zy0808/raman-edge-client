<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>差谱运算 - 拉曼光谱边缘计算客户端</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .difference-container {
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .spectrum-load-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .spectrum-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .spectrum-card h3 {
            margin: 0 0 15px 0;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .spectrum-card .spectrum-info {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .spectrum-chart-container {
            height: 200px;
            background: var(--bg-primary);
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .load-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .coefficient-panel {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .coefficient-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            align-items: end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .control-group input[type="number"] {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 14px;
        }

        .result-panel {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .result-chart-container {
            height: 300px;
            background: var(--bg-primary);
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .stat-item {
            background: var(--bg-primary);
            padding: 12px;
            border-radius: 4px;
            text-align: center;
        }

        .stat-item .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .stat-item .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--secondary-color);
            color: white;
        }

        .btn-secondary:hover {
            opacity: 0.9;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-ready {
            background: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
        }

        .status-loading {
            background: rgba(255, 152, 0, 0.1);
            color: #FF9800;
        }

        .status-empty {
            background: rgba(158, 158, 158, 0.1);
            color: #9E9E9E;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-loading .dot {
            animation: pulse 1.5s ease-in-out infinite;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">
                <h2>🔬 拉曼光谱客户端</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">📊 主界面</a></li>
                <li><a href="live.html">▶️ 实时采集</a></li>
                <li><a href="peaks.html">🔍 峰值分析</a></li>
                <li><a href="processing.html">⚙️ 谱图预处理</a></li>
                <li><a href="difference.html" class="active">➖ 差谱运算</a></li>
                <li><a href="settings.html">⚙️ 系统设置</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <h1>➖ 差谱运算</h1>
                <div class="status-bar">
                    <div id="bridgeStatus" class="status-indicator status-loading">
                        <span class="dot"></span>
                        <span>连接中...</span>
                    </div>
                </div>
            </header>

            <div class="difference-container">
                <!-- 光谱加载面板 -->
                <div class="spectrum-load-panel">
                    <!-- 光谱 1 -->
                    <div class="spectrum-card">
                        <h3>
                            <span>📈</span>
                            参考光谱 (被减数)
                        </h3>
                        <div class="spectrum-info" id="spectrum1Info">
                            <span class="status-empty">
                                <span class="dot"></span>
                                未加载光谱
                            </span>
                        </div>
                        <div class="spectrum-chart-container" id="spectrum1Chart"></div>
                        <div class="load-buttons">
                            <button class="btn btn-secondary" onclick="loadSpectrum1()">
                                📂 从文件加载
                            </button>
                            <button class="btn btn-secondary" onclick="loadFromCurrent1()">
                                📋 从当前数据
                            </button>
                            <button class="btn btn-secondary" onclick="loadDemoSpectrum1()">
                                🧪 加载演示数据
                            </button>
                        </div>
                    </div>

                    <!-- 光谱 2 -->
                    <div class="spectrum-card">
                        <h3>
                            <span>📉</span>
                            待减光谱 (减数)
                        </h3>
                        <div class="spectrum-info" id="spectrum2Info">
                            <span class="status-empty">
                                <span class="dot"></span>
                                未加载光谱
                            </span>
                        </div>
                        <div class="spectrum-chart-container" id="spectrum2Chart"></div>
                        <div class="load-buttons">
                            <button class="btn btn-secondary" onclick="loadSpectrum2()">
                                📂 从文件加载
                            </button>
                            <button class="btn btn-secondary" onclick="loadFromCurrent2()">
                                📋 从当前数据
                            </button>
                            <button class="btn btn-secondary" onclick="loadDemoSpectrum2()">
                                🧪 加载演示数据
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 系数设置面板 -->
                <div class="coefficient-panel">
                    <h3>⚙️ 运算参数</h3>
                    <div class="coefficient-controls">
                        <div class="control-group">
                            <label for="coefficientValue">减数系数 (k):</label>
                            <input type="number" id="coefficientValue" value="1.0" step="0.1" min="-10" max="10">
                        </div>
                        <div class="control-group">
                            <label>公式预览:</label>
                            <div style="font-family: monospace; padding: 8px; background: var(--bg-primary); border-radius: 4px;">
                                difference = spectrum1 - k × spectrum2
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 结果面板 -->
                <div class="result-panel">
                    <h3>📊 差谱结果</h3>
                    <div class="result-chart-container" id="resultChart"></div>
                    
                    <div class="result-stats" id="resultStats" style="display: none;">
                        <div class="stat-item">
                            <div class="stat-label">最大值</div>
                            <div class="stat-value" id="statMax">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">最小值</div>
                            <div class="stat-value" id="statMin">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">平均值</div>
                            <div class="stat-value" id="statMean">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">标准差</div>
                            <div class="stat-value" id="statStd">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">数据点数</div>
                            <div class="stat-value" id="statPoints">-</div>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="calculateDifference()" id="calculateBtn">
                            🚀 开始计算
                        </button>
                        <button class="btn btn-secondary" onclick="exportDifference()" id="exportBtn" disabled>
                            💾 导出结果
                        </button>
                        <button class="btn btn-secondary" onclick="clearAll()">
                            🗑️ 清空全部
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/qwebchannel.js"></script>
    <script src="../js/plotly.min.js"></script>
    <script type="module" src="../js/difference.js"></script>
</body>
</html>
