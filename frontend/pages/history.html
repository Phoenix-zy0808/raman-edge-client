<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史数据 - 拉曼光谱边缘客户端</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .history-container { padding: 20px; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-bar input { flex: 1; background: #1a1a2e; color: #eee; border: 1px solid #333; padding: 10px; border-radius: 4px; }
        .data-list { background: #16213e; border-radius: 8px; padding: 15px; }
        .data-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #333; cursor: pointer; }
        .data-item:hover { background: rgba(0, 217, 255, 0.1); }
        .data-info { flex: 1; }
        .data-name { color: #00d9ff; font-weight: bold; }
        .data-date { color: #888; font-size: 0.85em; }
        .data-actions { display: flex; gap: 8px; }
        .btn-view { background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%); color: #000; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-export { background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%); color: #000; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%); color: #fff; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 历史数据</h1>
        <button onclick="window.close()" style="background:transparent;border:none;color:#fff;font-size:24px;cursor:pointer;">×</button>
    </div>
    
    <div class="history-container">
        <!-- 开发中提示 -->
        <div style="background: rgba(255, 170, 0, 0.1); border: 2px solid #ffaa00; border-radius: 8px; padding: 15px; margin-bottom: 20px; color: #ffaa00; text-align: center;">
            <span style="font-size: 24px; margin-right: 8px;">🚧</span>
            <strong>功能开发中</strong> - 历史数据管理功能预计在下个版本上线
        </div>

        <div class="search-bar">
            <input type="text" id="search-input" placeholder="搜索样品名称、备注..." disabled style="opacity: 0.6;">
            <input type="date" id="date-from" disabled style="opacity: 0.6;">
            <input type="date" id="date-to" disabled style="opacity: 0.6;">
            <button onclick="showDevNotice('搜索')" style="background:#00d9ff;color:#000;border:none;padding:10px 20px;border-radius:4px;cursor:not-allowed;opacity: 0.7;">🔍 搜索</button>
        </div>

        <div class="data-list" id="data-list">
            <!-- 动态加载历史数据 -->
        </div>
    </div>

    <script>
        const mockData = [
            { id: 1, name: '样品 001', date: '2026-03-20 14:30', note: '硅片标准物质' },
            { id: 2, name: '样品 002', date: '2026-03-21 09:15', note: '石墨烯样品' },
            { id: 3, name: '样品 003', date: '2026-03-21 10:45', note: '未知物质检测' }
        ];

        function renderDataList(data) {
            const list = document.getElementById('data-list');
            list.innerHTML = data.map(d => `
                <div class="data-item">
                    <div class="data-info">
                        <div class="data-name">${d.name}</div>
                        <div class="data-date">${d.date} - ${d.note}</div>
                    </div>
                    <div class="data-actions">
                        <button class="btn-view" onclick="showDevNotice('查看数据')" style="opacity: 0.7; cursor: not-allowed;">查看</button>
                        <button class="btn-export" onclick="showDevNotice('导出数据')" style="opacity: 0.7; cursor: not-allowed;">导出</button>
                        <button class="btn-delete" onclick="showDevNotice('删除数据')" style="opacity: 0.7; cursor: not-allowed;">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function showDevNotice(featureName) {
            showToast(`🚧 ${featureName}功能开发中，敬请期待！`, 'warning');
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: ${type === 'warning' ? '#ffaa00' : '#00d9ff'};
                color: #000;
                padding: 12px 24px;
                border-radius: 6px;
                font-weight: bold;
                z-index: 10000;
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        renderDataList(mockData);
    </script>
</body>
</html>
